# Site Configuration
title: Sathiyaraj Venkatachalapathy
description: >
  Lead Java Developer & Cloud-Native Engineer
  | 12+ Years of Experience
  | Spring Boot · GCP · Kubernetes · Angular
  | Open to roles in Europe, Singapore & Malaysia
baseurl: ""
url: "https://jaisathiyamca.github.io"

# Author Information
author:
  name: Sathiyaraj Venkatachalapathy
  email: srisathiyamca@gmail.com
  bio: "Lead Java Developer with 12+ years of experience building enterprise systems at Renault Nissan, Infosys and CAMS. Expert in Spring Boot, GCP, Kubernetes, and Angular. Passionate about clean architecture, system design, and sharing knowledge through writing."
  profile_image: /assets/images/profile.png
  location: "Tamil Nadu, India"

# Social Media Links
social:
  github: jaisathiyamca
  linkedin: sathiyaraj-venkatachalapathy-706569188
  email: srisathiyamca@gmail.com

# Build Settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude files
exclude:
  - .jekyll-cache/
  - .gitignore
  - node_modules/
  - vendor/
  - .DS_Store

# Collections
collections:
  challenges:
    output: true
    permalink: /challenges/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      permalink: /blog/:year/:month/:day/:title/
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
